appId: com.robert.projecthub
productName: ProjectHub
directories:
  buildResources: build
  output: dist
publish:
  provider: github
  owner: DrDolphin
  repo: ProjectHub
  # Default releaseType is "draft" — which makes the release invisible to
  # electron-updater (it only sees published releases via /releases/latest/).
  # Force "release" so tag-triggered CI publishes immediately and the update
  # feed is live the moment the build finishes.
  releaseType: release
files:
  - 'out/**/*'
  - 'package.json'
asar: true
win:
  target:
    - nsis
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
