appId: com.robert.projecthub
productName: ProjectHub
directories:
  buildResources: build
  output: dist
publish:
  provider: github
  owner: DrDolphin
  repo: ProjectHub
files:
  - 'out/**/*'
  - 'package.json'
asar: true
win:
  target:
    - nsis
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
