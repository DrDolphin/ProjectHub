name: CI

# Build gate: every PR to main and every push to main must lint,
# typecheck, run unit tests, and build. Runs on Windows because
# ProjectHub is a Windows-only app and the store tests assert Windows
# path semantics (backslash-normalized metadata keys), so CI must mirror
# the target/dev OS. Windows packaging + release publishing live in
# release.yml (tag-triggered).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, Typecheck, Test & Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
