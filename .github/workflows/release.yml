name: Release

# Cut a release by pushing a version tag:
#   git tag v0.2.0 && git push origin v0.2.0
# This builds the Windows installer and publishes it (plus latest.yml) to a
# GitHub Release attached to that tag. Installed apps then auto-detect it.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # GITHUB_TOKEN needs this to create the release + upload assets.

jobs:
  release:
    name: Build & Publish Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build & publish to GitHub Releases
        env:
          # electron-builder uses this to create the release and upload assets.
          # --publish always: publish even on a tag (required for the auto-update feed).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-vite build && pnpm exec electron-builder --win --publish always
