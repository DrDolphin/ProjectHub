# Keep dependencies and CI actions current. Backwards-compatible updates
# (minor + patch) are grouped into a single weekly PR to keep noise low,
# while major-version bumps arrive as individual PRs so each breaking
# upgrade gets deliberate, isolated review. Electron ships a Chromium/Node
# runtime with regular CVEs, so its security patches surface promptly here.
version: 2

updates:
  # npm (pnpm) dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # All non-breaking updates land together in one reviewable PR.
      npm-minor-patch:
        update-types:
          - minor
          - patch
    # Major versions are intentionally left out of the group so each
    # arrives as its own PR for deliberate, isolated review.

  # GitHub Actions used in the CI and release workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
